on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true
      - uses: gradle/actions/setup-gradle@v6
      - name: Install Android SDK Platform 36
        run: |
          echo y | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"
      - run: |
          echo "flutter.compileSdkVersion=36" > android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
      - run: flutter pub get
      - run: flutter build apk --split-per-abi
      - uses: actions/upload-artifact@v7
        with:
          name: release-apk-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 7
      - run: flutter test
