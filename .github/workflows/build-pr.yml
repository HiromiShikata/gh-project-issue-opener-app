name: Build PR APK

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: build-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true
      - uses: gradle/actions/setup-gradle@v6
      - name: Install Android SDK Platform 36
        run: |
          echo y | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"
      - run: |
          echo "flutter.compileSdkVersion=36" > android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v7
        with:
          name: debug-apk-pr-${{ github.event.pull_request.number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  post_artifact_link:
    runs-on: ubuntu-latest
    needs: [build]
    concurrency:
      group: post-artifact-link-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Post APK download link to PR description
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100
            });

            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

            const suiteId = run.check_suite_id;
            const prNumber = context.payload.pull_request.number;
            const artifactName = `debug-apk-pr-${prNumber}`;
            const artifact = artifacts.find((a) => a.name === artifactName);

            const startMarker = '<!-- apk-artifact-link -->';
            const endMarker = '<!-- /apk-artifact-link -->';

            let artifactLine;
            if (artifact) {
              const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/suites/${suiteId}/artifacts/${artifact.id}`;
              artifactLine = `- Debug APK: [${artifactName}](${artifactUrl})`;
            } else {
              artifactLine = '- Debug APK: (artifact not found)';
            }

            const section = [startMarker, artifactLine, endMarker].join('\n');

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const currentBody = pr.body || '';
            let newBody;
            if (currentBody.includes(startMarker)) {
              newBody = currentBody.replace(
                new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`),
                section
              );
            } else {
              newBody = currentBody + '\n\n' + section;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: newBody
            });
