name: Build PR APK

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: build-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true
      - uses: gradle/actions/setup-gradle@v6
      - name: Install Android SDK Platform 36
        run: |
          echo y | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"
      - run: |
          echo "flutter.compileSdkVersion=36" > android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/ci-signing.jks
            printf 'storeFile=ci-signing.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > android/key.properties
          fi
      - run: flutter pub get
      - run: flutter build apk --split-per-abi
      - uses: actions/upload-artifact@v7
        with:
          name: release-apk-arm64-v8a-pr-${{ github.event.pull_request.number }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 7

  post_artifact_link:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: post-artifact-link-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Post APK download link to PR description
        uses: actions/github-script@v9
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100
            });

            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

            const suiteId = run.check_suite_id;
            const prNumber = context.payload.pull_request.number;
            const artifactName = `release-apk-arm64-v8a-pr-${prNumber}`;
            const artifact = artifacts.find((a) => a.name === artifactName);

            const startMarker = '<!-- apk-artifact-link -->';
            const endMarker = '<!-- /apk-artifact-link -->';

            let artifactLine;
            if (artifact) {
              const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/suites/${suiteId}/artifacts/${artifact.id}`;
              artifactLine = `- Release APK (arm64-v8a): [${artifactName}](${artifactUrl})`;
            } else {
              artifactLine = '- Release APK (arm64-v8a): (artifact not found)';
            }

            const section = [startMarker, artifactLine, endMarker].join('\n');

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const currentBody = pr.body || '';
            let newBody;
            if (currentBody.includes(startMarker)) {
              newBody = currentBody.replace(
                new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`),
                section
              );
            } else {
              newBody = currentBody + '\n\n' + section;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: newBody
            });
